            left: 0;
            width: 0;
            height: 2px;

        .nav a:hover::after,

    const grid = document.getElementById('unofficialGrid');

    // ===== ПОЛУЧАЕМ ID ИЗ URL =====
    const params = new URLSearchParams(window.location.search);
    const albumId = params.get('id');

    function toggleLyrics(id) {
        const el = document.getElementById(`lyrics-${id}`);
        if (el) {
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }
    }

    if (albumId && albumTracks[albumId]) {
        const tracks = albumTracks[albumId];
        const album = unofficialAlbums.find(a => a.id === albumId);

        let tracksHtml = tracks.map((track, index) => {
            const lyricsId = `${albumId}-${index}`;
            return `
                <div class="track-item">
                    <div class="track-row">
                        <span class="num">${String(index + 1).padStart(2, '0')}.</span>
                        <span class="name">${track.title}</span>
                        <button class="btn-lyrics" onclick="toggleLyrics('${lyricsId}')">📝</button>
                        <span class="play">▶</span>
                    </div>
                    <div class="track-audio">
                        <audio controls>
                            <source src="${track.audio}" type="audio/mpeg">

                        </audio>
                    </div>
                    <div class="track-lyrics" id="lyrics-${lyricsId}">${track.lyrics}</div>
                </div>
            `;
        }).join('');

                        </div>
