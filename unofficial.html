<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIJA | Неофициальное</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(255, 0, 60, 0.04), transparent 60%),
                        radial-gradient(ellipse at 80% 50%, rgba(100, 0, 255, 0.03), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            width: 92%;
            margin: 0 auto;
            padding: 20px 0;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff003c, #ff6b8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav a {
            color: #aaa;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            position: relative;
        }

        .nav a:hover,
        .nav a.active {
            color: #ff003c;
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #ff003c;
            transition: 0.3s;
        }

        .nav a:hover::after,
        .nav a.active::after {
            width: 100%;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin: 40px 0 10px;
            letter-spacing: 2px;
        }

        .page-title span {
            color: #ff003c;
        }

        .page-subtitle {
            text-align: center;
            color: #666;
            font-size: 1rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .unofficial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .unofficial-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            display: block;
        }

        .unofficial-card:hover {
            border-color: #ff003c;
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(255, 0, 60, 0.08);
        }

        .unofficial-card .cover-wrap {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #0a0a0a;
            position: relative;
        }

        .unofficial-card .cover-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
        }

        .unofficial-card:hover .cover-wrap img {
            transform: scale(1.03);
        }

        .unofficial-card .cover-wrap .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
            backdrop-filter: blur(2px);
        }

        .unofficial-card:hover .cover-wrap .play-overlay {
            opacity: 1;
        }

        .unofficial-card .cover-wrap .play-overlay span {
            font-size: 2.5rem;
            color: #fff;
            background: #ff003c;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(255, 0, 60, 0.3);
        }

        .unofficial-card .info {
            padding: 16px 18px 18px;
        }

        .unofficial-card .badge {
            display: inline-block;
            font-size: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 2px 12px;
            border-radius: 20px;
            margin-bottom: 8px;
            background: #00b4d8;
            color: #fff;
        }

        .unofficial-card .badge.bandlab {
            background: #00b4d8;
        }

        .unofficial-card .badge.soundcloud {
            background: #ff5500;
        }

        .unofficial-card .badge.telegram {
            background: #0088cc;
        }

        .unofficial-card .badge.local {
            background: #6a00ff;
        }

        .unofficial-card .title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unofficial-card .meta {
            font-size: 0.7rem;
            color: #666;
        }

        .unofficial-card .tracks-count {
            font-size: 0.7rem;
            color: #ff003c;
            margin-top: 4px;
        }

        /* ===== СТРАНИЦА АЛЬБОМА ===== */
        .album-detail {
            grid-column: 1 / -1;
        }

        .album-detail .back-link {
            display: inline-block;
            color: #888;
            text-decoration: none;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .album-detail .back-link:hover {
            color: #ff003c;
        }

        .album-detail .album-info {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .album-detail .album-info h2 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .album-detail .album-info .date {
            color: #888;
            margin-bottom: 4px;
        }

        .album-detail .album-info .desc {
            color: #666;
            margin-bottom: 20px;
        }

        .album-detail .track-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }

        .album-detail .track-list .track-item {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }

        .album-detail .track-list .track-item:hover {
            border-color: #ff003c;
        }

        .album-detail .track-list .track-item .track-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .album-detail .track-list .track-item .num {
            color: #ff003c;
            font-weight: bold;
            font-size: 0.85rem;
            min-width: 30px;
        }

        .album-detail .track-list .track-item .name {
            flex: 1;
        }

        .album-detail .track-list .track-item .btn-lyrics {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .album-detail .track-list .track-item .btn-lyrics:hover {
            color: #ff003c;
        }

        .album-detail .track-list .track-item .play {
            color: #555;
            transition: 0.3s;
        }

        .album-detail .track-list .track-item:hover .play {
            color: #ff003c;
        }

        .album-detail .track-list .track-item .track-audio {
            margin-left: 45px;
        }

        .album-detail .track-list .track-item .track-audio audio {
            width: 100%;
            height: 32px;
            outline: none;
            border-radius: 6px;
        }

        .album-detail .track-list .track-item .track-audio audio::-webkit-media-controls-panel {
            background: #1a1a1a;
        }

        .album-detail .track-list .track-item .track-lyrics {
            display: none;
            margin-left: 45px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            color: #888;
            font-size: 0.85rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .footer {
            text-align: center;
            padding: 40px 0 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .footer p {
            color: #555;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .nav {
                gap: 20px;
            }
            .page-title {
                font-size: 2rem;
            }
            .unofficial-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 20px;
            }
            .album-detail .album-info h2 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .page-title {
                font-size: 1.6rem;
            }
            .unofficial-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .unofficial-card .info {
                padding: 12px 14px 14px;
            }
            .unofficial-card .title {
                font-size: 0.85rem;
            }
            .unofficial-card .meta {
                font-size: 0.6rem;
            }
            .unofficial-card .cover-wrap .play-overlay span {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }
            .album-detail .album-info {
                padding: 20px;
            }
            .album-detail .album-info h2 {
                font-size: 1.3rem;
            }
            .album-detail .track-list .track-item {
                padding: 10px 12px;
            }
            .album-detail .track-list .track-item .track-row {
                font-size: 0.85rem;
                flex-wrap: wrap;
            }
            .album-detail .track-list .track-item .track-audio {
                margin-left: 0;
            }
            .album-detail .track-list .track-item .track-lyrics {
                margin-left: 0;
            }
        }
    </style>
</head>
