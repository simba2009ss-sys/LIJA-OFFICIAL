            padding: 0;

            background: #0d0d0d;

            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            width: 95%;
            margin: 0 auto;
            padding: 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        nav a {
            color: #888;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a.active,
        nav a:hover {
            color: #ff003c;
        }

        .back-link {
            display: inline-block;
            color: #888;
            text-decoration: none;
            margin: 20px 0;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #ff003c;
        }

        .page-title {
            text-align: center;
            font-size: 2.5rem;
            margin: 40px 0 10px;
            letter-spacing: 2px;
        }

        .page-title span {
            color: #ff003c;
        }

        .page-subtitle {
            text-align: center;
            color: #666;
            font-size: 1rem;
            margin-bottom: 40px;
        }

        .releases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .release-card {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: 0.3s;
            text-decoration: none;
            color: #fff;
            cursor: pointer;
        }

        .release-card:hover {
            transform: translateY(-8px);
            border-color: #ff003c;
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.1);
        }

        .release-card.highlight {
            border-color: #ff003c;
        }

        .release-card.highlight:hover {
            box-shadow: 0 0 40px rgba(255, 0, 60, 0.2);
        }

        .release-card .cover-wrap {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #0d0d0d;
        }

        .release-card .cover-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
        }

        .release-card:hover .cover-wrap img {
            transform: scale(1.03);
        }

        .release-card .info {
            padding: 14px 16px 16px;
        }

        .release-card .info .title {
            font-size: 0.9rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            display: block;
        }

        .release-card .info .meta {
            font-size: 0.7rem;
            color: #666;
            margin-top: 4px;
        }

        .release-card .info .badge {
            display: inline-block;
            font-size: 0.45rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 2px 10px;
            border-radius: 20px;
            margin-top: 6px;
        }

        .badge.album {
            background: #6a00ff;
            color: #fff;
        }
        .badge.single {
            background: #00aaff;
            color: #fff;
        }
        .badge.hit {
            background: #ff003c;
            color: #fff;
        }
        .badge.ep {
            background: #ff8c00;
            color: #fff;
        }

        .release-links {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .release-links a {
            color: #555;
            font-size: 0.85rem;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .release-links a:hover {
            color: #ff003c;
            border-color: #ff003c;
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.15);
        }

        .album-detail {
            animation: fadeUp 0.5s ease-out forwards;
        }

        .album-header {
            display: flex;
            gap: 30px;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .album-cover {
            width: 200px;
            height: 200px;
            border-radius: 16px;
            border: 1px solid #2a2a2a;
            overflow: hidden;
            flex-shrink: 0;
            background: #0d0d0d;
        }

        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-info {
            flex: 1;
        }

        .album-info h1 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 5px;
        }

        .album-info .date {
            color: #888;
            font-size: 1rem;
        }

        .album-info .prod {
            color: #666;
            font-size: 0.95rem;
            font-style: italic;
            margin-top: 5px;
        }

        .album-info .count {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .album-links {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .album-links a {
            color: #555;
            font-size: 1.2rem;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .album-links a:hover {
            color: #ff003c;
            border-color: #ff003c;
            transform: scale(1.15);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.15);
        }

        .track-list {
            list-style: none;
            padding: 0;
        }

        .track-list li {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }

        .track-list li:hover {
            border-color: #ff003c;
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.04);
        }

        .track-list li a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .track-list li a:hover {
            color: #ff003c;
        }

        .track-number {
            color: #ff003c;
            font-weight: bold;
            font-size: 0.85rem;
            min-width: 35px;
        }

        .track-title {
            flex: 1;
        }

        .play-icon {
            color: #555;
            transition: 0.3s;
        }

        .track-list li:hover .play-icon {
            color: #ff003c;
        }

        .footer {
            text-align: center;
            padding: 40px 0 20px;
            border-top: 1px solid #1a1a1a;
        }

        .footer p {
            color: #555;
            font-size: 0.8rem;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .releases-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));

            .album-header {

                align-items: center;
                text-align: center;

                height: 160px;
            }
            .album-info h1 {

            }
            .page-title {

            }

            }
            .track-number {

                min-width: 28px;

                width: 28px;
                height: 28px;
                font-size: 1rem;
            }
