<head>

    <title>LIJA | Релизы</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #f0f0f0;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 50%, rgba(255, 0, 60, 0.06), transparent 60%),
                        radial-gradient(ellipse at 80% 50%, rgba(100, 0, 255, 0.04), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            width: 92%;
            margin: 0 auto;
            padding: 20px 0;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff003c, #ff6b8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav a {
            color: #aaa;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            position: relative;
        }

        .nav a:hover,
        .nav a.active {
            color: #ff003c;
        }

        .nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #ff003c;
            transition: 0.3s;
        }

        .nav a:hover::after,
        .nav a.active::after {
            width: 100%;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin: 40px 0 10px;
            letter-spacing: 2px;
        }

        .page-title span {
            color: #ff003c;
        }

        .page-subtitle {
            text-align: center;
            color: #666;
            font-size: 1rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .releases-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            margin: 20px 0 60px;
        }

        .release-card {
            background: #141414;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            text-decoration: none;
            color: #fff;
            cursor: pointer;
        }

        .release-card:hover {
            transform: translateY(-8px);
            border-color: #ff003c;
            box-shadow: 0 20px 50px rgba(255, 0, 60, 0.1);
        }

        .release-card.highlight {
            border-color: #ff003c;
        }

        .release-card.highlight:hover {
            box-shadow: 0 20px 50px rgba(255, 0, 60, 0.2);
        }

        .release-card .cover-wrap {
            width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            overflow: hidden;
            background: #0a0a0a;
        }

        .release-card .cover-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s;
        }

        .release-card:hover .cover-wrap img {
            transform: scale(1.03);
        }

        .release-card .cover-wrap .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
            backdrop-filter: blur(2px);
        }

        .release-card:hover .cover-wrap .play-overlay {
            opacity: 1;
        }

        .release-card .cover-wrap .play-overlay span {
            font-size: 3rem;
            color: #fff;
            background: #ff003c;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(255, 0, 60, 0.4);
        }

        .release-card .info {
            padding: 16px 18px 18px;
        }

        .release-card .info .title {
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .release-card .info .meta {
            font-size: 0.75rem;
            color: #666;
            margin-top: 4px;
        }

        .release-card .info .badge {
            display: inline-block;
            font-size: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 10px;
            border-radius: 20px;
            margin-top: 8px;
        }

        .release-card .info .badge.album {
            background: #6a00ff;
            color: #fff;
        }

        .release-card .info .badge.single {
            background: #00aaff;
            color: #fff;
        }

        .release-card .info .badge.hit {
            background: #ff003c;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
        }

        .release-card .info .badge.ep {
            background: #ff8c00;
            color: #fff;
        }

        .release-links {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .release-links a {
            color: #555;
            font-size: 1.1rem;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .release-links a:hover {
            color: #ff003c;
            border-color: #ff003c;
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.15);
        }

        .footer {
            text-align: center;
            padding: 40px 0 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 20px;
        }

        .footer p {
            color: #555;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title,
        .page-subtitle,
        .releases-grid {
            animation: fadeUp 0.8s ease-out forwards;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .nav {
                gap: 20px;
            }
            .page-title {
                font-size: 2rem;
            }
            .releases-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 20px;
            }
            .release-links a {
                width: 24px;
                height: 24px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .releases-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .release-card .info {
                padding: 12px 14px 14px;
            }
            .release-card .info .title {
                font-size: 0.75rem;
            }
            .release-card .info .meta {
                font-size: 0.6rem;
            }
            .release-card .cover-wrap .play-overlay span {
                width: 50px;
                height: 50px;
                font-size: 2rem;
            }
            .page-title {
                font-size: 1.6rem;
            }
            .release-links a {
                width: 20px;
                height: 20px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>

    allReleases.forEach(release => {
        const card = document.createElement('a');
        card.className = 'release-card' + (release.highlight ? ' highlight' : '');
        card.href = release.link;

        let badgeText = '';
        let badgeClass = '';
        if (release.highlight) {
            badgeText = '⭐ ХИТ';
            badgeClass = 'hit';
        } else {
            const typeLabels = {
                album: '🎵 Альбом',
                ep: '📀 EP',
                single: '🎧 Сингл'
            };
            const typeClasses = {
                album: 'album',
                ep: 'ep',
                single: 'single'
            };
            badgeText = typeLabels[release.type] || '🎧 Сингл';
            badgeClass = typeClasses[release.type] || 'single';
        }

        let linksHtml = '';
        if (release.links) {
            for (const [platform, url] of Object.entries(release.links)) {
                if (url) {
                    linksHtml += `
                        <a href="${url}" target="_blank" title="${platform.charAt(0).toUpperCase() + platform.slice(1)}" onclick="event.stopPropagation();">
                            ${platformIcons[platform] || '🔗'}
                        </a>
                    `;
                }
            }
        }

        card.innerHTML = `
            <div class="cover-wrap">
                <img src="${release.cover}" alt="${release.title}" loading="lazy">
                <div class="play-overlay">
                    <span>▶</span>
                </div>
            </div>
            <div class="info">
                <div class="title">${release.title}</div>
                <div class="meta">📅 ${release.date} · ${release.tracksCount} треков</div>
                <span class="badge ${badgeClass}">${badgeText}</span>
                ${linksHtml ? `<div class="release-links">${linksHtml}</div>` : ''}
            </div>
        `;

        grid.appendChild(card);
    });
